<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{festival_name}} - {{target_name}} ke liye Special!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="fireworks"></div>
        
        <div class="card">
            <div class="confetti"></div>
            <div class="header">
                <div class="emoji">🎉</div>
                <h1>{{festival_name}} Mubarak {{target_name}}!</h1>
                <p>Is khushi ke mauke par ek special photo lete hain! 📸</p>
            </div>
            
            <div class="camera-section">
                <div class="camera-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C13.1 2 14.1 2.8 14.4 4L16 4C16.6 4 17 4.4 17 5V7C17 7.6 16.6 8 16 8H8C7.4 8 7 7.6 7 7V5C7 4.4 7.4 4 8 4L9.6 4C9.9 2.8 10.9 2 12 2M18 15V17C18 18.1 17.1 19 16 19H8C6.9 19 6 18.1 6 17V15C6 13.9 6.9 13 8 13H16C17.1 13 18 13.9 18 15M18 11H6V9C5.4 9 5 8.6 5 8V6C5 4.9 5.9 4 7 4H8C8.6 4 9 4.4 9 5V6C9 6.6 8.6 7 8 7H16C16.6 7 17 6.6 17 6V5C17 4.4 16.6 4 16 4H17C18.1 4 19 4.9 19 6V8C19 8.6 18.6 9 18 9V11Z"/>
                    </svg>
                </div>
                <button id="captureBtn" class="capture-btn">
                    <span>📷 Photo Click Karo!</span>
                </button>
                <p class="permission-text">Camera permission allow karo special moment capture karne ke liye!</p>
            </div>
            
            <div class="footer">
                <p>Happy {{festival_name}} {{target_name}}! 🌟</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
      </html>
